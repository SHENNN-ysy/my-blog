spring:
  application:
    name: blog-admin
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/my_blog?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    password: ${DB_PASSWORD:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:}

logging:
  level:
    root: warn
    com.my_blog: info
