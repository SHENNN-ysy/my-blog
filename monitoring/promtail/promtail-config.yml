server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 3s
    timeout: 30s

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s

    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container

      - source_labels: ['__meta_docker_container_name']
        regex: '/my-blog-demo'
        action: keep

      - target_label: job
        replacement: my-blog-demo

      - target_label: service
        replacement: my-blog-demo

      - target_label: env
        replacement: local

      - target_label: level
        replacement: UNKNOWN

      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream

      - source_labels: ['__meta_docker_container_id']
        target_label: __path__
        replacement: /var/lib/docker/containers/$1/*-json.log

    pipeline_stages:
      - json:
          expressions:
            log: log
            stream: stream
            time: time

      - regex:
          source: log
          expression: '^\s*(?P<ts>\S+)\s+(?P<level>TRACE|DEBUG|INFO|WARN|ERROR)\s+\d+\s+---\s+\[[^\]]+\]\s+\[[^\]]+\]\s+(?P<logger>[^:]+)\s+:\s+(?P<message>.*)$'

      - template:
          source: level
          template: '{{ if .Value }}{{ ToUpper .Value }}{{ else }}UNKNOWN{{ end }}'

      - labels:
          level:
          logger:
          stream:
          container:

      - static_labels:
          source: docker

      - output:
          source: log
